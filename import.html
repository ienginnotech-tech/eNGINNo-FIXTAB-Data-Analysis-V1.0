<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>นำเข้าข้อมูล — PSD_eNGINNo FIXTAB Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div id="app"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script src="js/storage.js"></script>
<script src="js/analyze.js"></script>
<script src="js/import.js"></script>
<script>
  renderShell("import.html");
  document.getElementById("mainContent").innerHTML = `
    <div class="topbar">
      <div>
        <div class="eyebrow">Import Center</div>
        <h2>นำเข้าข้อมูล</h2>
      </div>
      <div>
        <button class="btn secondary" onclick="clearInputStatus()">🗑 ล้าง Input</button>
        <button class="btn secondary" onclick="clearOutputData()">🗑 ล้าง Output</button>
        <button class="btn danger" onclick="clearAllData()">🗑 ล้างทั้งหมด</button>
      </div>
    </div>

    <div class="card">
      <h3>ขั้นตอนที่ 1 — ไฟล์ข้อมูลต้นฉบับ (6 ไฟล์)</h3>
      <p style="color:var(--text-muted);font-size:13px;margin-top:-6px">
        ไฟล์ดิบจาก Fixtab / D365 / งบประมาณ — ระบบจะบันทึกประวัติการนำเข้าไว้ให้ (ไม่ได้ใช้แสดงผลใน Dashboard โดยตรง
        เพราะต้องผ่านการวิเคราะห์ก่อน)
      </p>
      <div id="rawFilesList"></div>
    </div>

    <div class="section-title">ขั้นตอนที่ 2</div>
    <div class="card" style="border-color:var(--accent)">
      <h3>🧪 วิเคราะห์ในเบราว์เซอร์ (Beta) — ไม่ต้องใช้ Python</h3>
      <p style="color:var(--text-muted);font-size:13px;margin-top:-6px">
        อัปโหลดแค่ 2 ไฟล์ (Fixtab Export + PHA_report) ระบบจะวิเคราะห์ให้ทันทีในเบราว์เซอร์ ไม่ต้องรันสคริปต์ Python เลย
      </p>
      <p style="color:var(--danger);font-size:12px">
        ⚠️ ยังไม่ครอบคลุมทุกส่วน: ตอนนี้รองรับ "จัดหมวดอุปกรณ์ / แยกสัญญา PM / จำแนกลักษณะ Ticket / เกณฑ์ CAPEX-OPEX"
        แต่ยังไม่รองรับ Direct match และ Fuzzy match กับไฟล์ PR-PO Tracking (ไฟล์ "1.Budget Linked" จะว่าง)
        — ถ้าต้องการตัวเลขส่วนนั้น ให้ใช้สคริปต์ Python ควบคู่ไปก่อน
      </p>
      <div class="grid cols-2" style="margin-top:12px">
        <div class="field">
          <label>Fixtab Export (.xlsx)</label>
          <input type="file" id="anFixtabInput" accept=".xlsx" />
        </div>
        <div class="field">
          <label>PHA_report.xlsx</label>
          <input type="file" id="anPhaInput" accept=".xlsx" />
        </div>
      </div>
      <button class="btn" onclick="runBrowserAnalysis(event)">▶ เริ่มวิเคราะห์</button>
      <div id="anProgress" style="margin-top:12px;font-size:13px;color:var(--text-muted)"></div>
    </div>

    <div class="section-title">หรือ ขั้นตอนที่ 2 (แบบเดิม)</div>
    <div class="card">
      <h3>ไฟล์ผลการวิเคราะห์ (4 ไฟล์) — จากสคริปต์ Python</h3>
      <p style="color:var(--text-muted);font-size:13px;margin-top:-6px">
        ไฟล์ผลลัพธ์จากการวิเคราะห์ — ระบบจะอ่านข้อมูลทั้งหมดเพื่อนำไปแสดงในหน้า Dashboard ทันที
      </p>
      <div id="analysisFilesList"></div>
      <div style="margin-top:16px">
        <a href="dashboard.html" class="btn">ไปที่ Dashboard →</a>
      </div>
    </div>
  `;
  initImportPage();
</script>
</body>
</html>
